<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema TI</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="logout.css">
</head>

<body class="centralizado">

<div class="card">
    <h1 class="titulo">TI System</h1>
    <p class="subtitulo">Acesse sua conta</p>

    <form id="formLogin">

        <div class="campo">
            <label>Email</label>
            <input type="email" id="email" required>
        </div>

        <div class="campo">
            <label>Senha</label>
            <input type="password" id="senha" required>
        </div>

        <p id="erro" class="erro"></p>

        <button type="submit" class="botao">Entrar</button>

    </form>
    <br>
    <div class="link"> Não tem conta?<a href="cadastro.html"> Cadastrar</a></div>
</div>

    <script src="login.js"></script>
    </body>
    </html>

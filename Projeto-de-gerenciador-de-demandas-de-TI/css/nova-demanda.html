<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova Solicitação - TI System</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="demanda.css">
    <link rel="stylesheet" href="logout.css">
    <link rel="stylesheet" href="novas-demanda.css">
</head>

<body>

<!-- MENU LATERAL -->
<div class="menu-lateral">
    <h2>TI System</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="demandas.html">Meus Chamados</a>
    <a class="ativo" href="#">Nova Solicitação</a>
    <a href="#" onclick="sair()" class="logout">Sair</a>
</div>

<!-- FORMULÁRIO -->
<div class="conteudo">
    <div class="card-dashboard">
        <h2 class="titulo">Nova Solicitação</h2>
        <p class="subtitulo">Preencha os campos obrigatórios</p>

        <form id="formSolicitacao">
            <div class="campo">
                <label>Título *</label>
                <input type="text" id="titulo" placeholder="Ex: Problema com acesso ao sistema" required>
            </div>

            <div class="campo">
                <label>Descrição *</label>
                <textarea id="descricao" rows="5" placeholder="Descreva o problema em detalhes" required></textarea>
            </div>

            <div class="cards">
                <div class="campo">
                    <label>Categoria *</label>
                    <select id="categoria" required>
                        <option value="">Selecione</option>
                        <option>Suporte</option>
                        <option>Melhoria</option>
                        <option>Bug</option>
                        <option>Infraestrutura</option>
                    </select>
                </div>

                <div class="campo">
                    <label>Grau de Urgência *</label>
                    <select id="urgencia" required>
                        <option value="">Selecione</option>
                        <option>Baixa</option>
                        <option>Média</option>
                        <option>Alta</option>
                    </select>
                </div>
            </div>

            <p id="erro" class="erro"></p>

            <button class="botao" type="submit">Enviar Chamado</button>
        </form>
    </div>
</div>

<script src="nova-demanda.js"></script>
<script src="logout.js"></script>

</body>
</html>

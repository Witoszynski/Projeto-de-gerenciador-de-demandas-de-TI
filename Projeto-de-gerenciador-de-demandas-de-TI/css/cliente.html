    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <title>Nova Solicitação</title>
    <link rel="stylesheet" href="cliente.css">
    
    </head>

    <body>

    <div class="container">

        <div class="topo">
            <h2>Nova Solicitação</h2>
            <div>
                <button onclick="irAcompanhar()">Meus Chamados</button>
                <button onclick="sair()" class="sair">Sair</button>
            </div>
        </div>

        <div class="card">

            <form id="formCliente">

                <div class="campo">
                    <label>Título</label>
                    <input id="titulo" required>
                </div>

                <div class="campo">
                    <label>Descrição</label>
                    <textarea id="descricao" required></textarea>
                </div>

                <div class="campo">
                    <label>Categoria</label>
                    <select id="categoria">
                        <option>Infraestrutura</option>
                        <option>Software</option>
                        <option>Acessos</option>
                        <option>Outros</option>
                    </select>
                </div>

                <h3>Grau de Urgência</h3>

                <div class="grid">
                    <div class="campo-select">
                        <label>Impacto</label>
                        <select id="g"><option value="1">Baixa</option><option value="3">Média</option><option value="5">Alta</option></select>
                    </div>
                    <div class="campo-select">
                        <label>Prioridade</label>
                        <select id="u"><option value="1">Baixa</option><option value="3">Média</option><option value="5">Alta</option></select>
                    </div>
                    <div class="campo-select">
                        <label>Evolução do Problema</label>
                        <select id="t"><option value="1">Baixa</option><option value="3">Média</option><option value="5">Alta</option></select>
                    </div>
                </div>

                <p id="resultado"></p>

                <button type="submit" class="botao">Enviar Chamado</button>

            </form>

        </div>

    </div>

    <script src="cliente.js"></script>
    </body>
    </html>

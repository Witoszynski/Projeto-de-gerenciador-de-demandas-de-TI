<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Usuários</title>
    <link rel="stylesheet" href="/css-20260510T162854Z-3-001/css/global.css">
    <link rel="stylesheet" href="/css-20260510T162854Z-3-001/css/demanda.css">
    <link rel="stylesheet" href="/css-20260510T162854Z-3-001/css/logout.css">
</head>
<body>
    <div class="menu-lateral">
        <h2>Suporte Técnico</h2>
        <a href="dashboard.html">Dashboard</a>
        <a href="demandas.html">Demandas</a>
        <a class="ativo" href="#">Usuários</a>
        <a href="#" onclick="sair()" class="logout">Sair</a>
    </div>

    <div class="conteudo">
        <h1>Usuários</h1>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Tipo</th>
                </tr>
            </thead>
            <tbody id="tabelaUsuarios"></tbody>
        </table>
    </div>

    <script src="/javascript-20260510T162856Z-3-001/javascript/logout.js"></script>
    <script>
        const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
        const tabela = document.getElementById("tabelaUsuarios");

        usuarios.forEach(u => {
            const tipo = u.email.endsWith("@admin.com") ? "Admin" : "Cliente";
            tabela.innerHTML += `
                <tr>
                    <td>${u.nome}</td>
                    <td>${u.email}</td>
                    <td>${tipo}</td>
                </tr>
            `;
        });
    </script>
</body>
</html>
